name: Deploy to GitHub Pages

# main 브랜치 푸시 또는 수동 트리거 시 src/ 디렉토리를 GitHub Pages 로 배포한다.
# Pages 는 자동으로 https://<user>.github.io/<repo>/ 의 서브디렉토리에 매핑.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 권한.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 충돌 방지 — 진행 중인 deploy 가 있으면 새 트리거를 기다리지 말고 취소.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (src/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
